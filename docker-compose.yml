version: "3.9"

services:
  backend:
    image: zachariahmayfield/plant-tracker:backend-latest
    container_name: plant-tracker-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data  # Optional local mount for app data
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    image: zachariahmayfield/plant-tracker:frontend-latest
    container_name: plant-tracker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: plant-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-plantdb}
    volumes:
      - plant-tracker_postgres_data:/var/lib/postgresql/data  # Correct volume name
      - ./pg_backups:/backups  # Mount local backups folder to container

volumes:
  plant-tracker_postgres_data:  # Correct volume name
