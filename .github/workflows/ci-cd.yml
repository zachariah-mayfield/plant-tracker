name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: zachariahmayfield/plant-tracker
  DOCKER_TAG: ${{ github.sha }}
  DOCKER_REGISTRY: docker.io
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ./backend

      - name: Run backend tests
        run: |
          pytest --maxfail=1 --disable-warnings -q
        working-directory: ./backend

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install frontend dependencies
        run: |
          npm ci
        working-directory: ./frontend

      - name: Run frontend tests
        run: |
          npm test
        working-directory: ./frontend

  build-and-push:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:backend-${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:backend-latest
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:backend-latest
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:frontend-${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:frontend-latest
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:frontend-latest
          cache-to: type=inline

      - name: Update docker-compose.yml
        run: |
          sed -i "s|image: zachariahmayfield/plant-tracker:.*|image: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:backend-${{ env.DOCKER_TAG }}|" docker-compose.yml
          sed -i "s|image: zachariahmayfield/plant-tracker:.*|image: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:frontend-${{ env.DOCKER_TAG }}|" docker-compose.yml
        shell: bash